services:
  - type: web
    name: authlayer-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AuthLayer API
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TEXT_DETECTION_PROVIDER
        value: huggingface
      - key: URL_CHECK_PROVIDER
        value: google_safe_browsing
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: PROVIDER_TIMEOUT_SECONDS
        value: "15"
    healthCheckPath: /health
